name: test

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Verify mechanism closure catalog
        run: uv run python scripts/verify_mechanism_catalog.py
      - name: Verify frozen World v2 offline scenario evidence
        run: >-
          uv run python scripts/verify_world_v2_scenarios.py
          --workdir "$RUNNER_TEMP/world-v2-scenarios"
          --output "$RUNNER_TEMP/world-v2-scenarios/manifest.json"
      - name: Verify formal World v2 evaluation artifact pipeline structure
        run: >-
          uv run companion-world-v2-formal-eval verify-fixture
          --output-dir "$RUNNER_TEMP/world-v2-formal-eval"
      - name: Verify World v2 platform reverse-dependency boundary
        run: uv run python scripts/verify_world_v2_platform_architecture.py
      - name: Run tests
        run: uv run pytest -q
