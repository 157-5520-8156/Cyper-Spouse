# Reviewed static possibility catalog for the World-v2 Life Author.  These are
# reviewed possibilities only: a location/NPC may become a plan binding only
# after its exact availability is checked and snapshotted at a committed clock
# wake. No result or experience is asserted by selecting one; runtime history
# remains ledger-owned.
life_author_catalog:
  # reviewed-life.4 widens the two low-intensity filler openings (quiet rest,
  # digital browsing) so ordinary afternoons are lived rather than blank.
  # reviewed-life.5 adds the future_openings section: activities she may
  # commit to one to seven local days ahead, honored by the ordinary activity
  # lifecycle when the day arrives.
  # reviewed-life.6 adds the npc_initiated_events section: reviewed moments in
  # which 范予安 may act first (borrow a book, pull her aside, disagree about
  # the reading list).  base_chance_bp keeps each a rare texture; whether one
  # happens is a recorded weighted draw plus a bounded model confirmation.
  # reviewed-life.7 adds the aspiration_seeds section: reviewed low-stakes
  # wishes (no due window, no lifecycle pipeline) she may quietly come to
  # hold when recent lived material makes them plausible.
  # reviewed-life.8 changes daily-quota attribution: an acceptance in the
  # after-midnight tail of a wrapping window (bedtime at 00:01) counts
  # against the previous local day, so it no longer freezes the whole next
  # evening's life author.
  # reviewed-life.9 adds the crystallization seam: an aspiration seed may
  # name one reviewed future opening (crystallizes_into) that a supported,
  # long-held wish can — rarely, via a recorded draw plus bounded model
  # confirmation — turn into a concrete calendar plan.
  # reviewed-life.10 adds the first shared_private future opening: a rare,
  # relationship-gated invitation to do something together with the user.
  # The invitation lane only plans-and-asks; the activity can start only on
  # a real user answer (activity lifecycle shared_private contract), and an
  # unanswered window is quietly abandoned.
  # reviewed-life.11 widens the whole possibility space so her days stop
  # cycling the same twelve moments: 22 new present openings across study
  # (读书笔记/上课/赶论文/自习), creation (随笔/胶片/日记), errands and
  # meals (洗衣/取快递/买水果/食堂/宿舍煮饭), body-and-mind (拉伸/发呆/
  # 午睡/播客), social life (给家里打电话/室友夜聊/文学社事务) and going
  # out (校园骑车/打印店/旧书摊); 5 new future openings (回嘉兴帮书店、和
  # 范予安看展、二手书市、外滩夜拍、图书馆研讨间); a second reviewed NPC
  # (室友林晚) with her own presence, one shared opening and two initiated
  # events; 3 new 范予安 initiated events; and 4 new aspiration seeds, two
  # of which may crystallize into the new future openings.  Weekday-only and
  # weekend-only windows differentiate her workdays from her weekends.
  # reviewed-life.12 registers the visual_evidence annex so the image machine
  # stops starving: every settled shareable occurrence with a reviewed annex
  # may (via a recorded draw) become one source-bound visual declaration.
  # Ten public/shareable openings register concrete location/environment/
  # object slices plus reviewed self-capture facts (selfie at walks/cycling/
  # parcel runs/book stalls, timer+helper check-ins at the truly public 外滩
  # and 旧书市); the three private hygiene/sleep transitions register the
  # self-authored front-camera/mirror facts P3 needs.  Five thin shareable
  # openings also gain one more picture-worthy outcome each.  The annex is
  # configuration only: no photo, candidate or delivery is asserted here.
