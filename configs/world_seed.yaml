  # Aspiration seeds are the reviewed wishes she may quietly come to hold.
  # Planting one asserts no plan and no deadline: it only enters her private
  # expression context ("我一直想…") and may later fade, be reinforced by
  # related lived material, or — rarely — crystallize into a real plan.
