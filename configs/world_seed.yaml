  # NPC-initiated events are the reviewed ways 范予安 may enter her day
  # uninvited.  Each carries a warm and a strained outcome; the settled one
  # becomes an ordinary Committed Experience with a mandatory appraisal, so a
  # borrowed book can genuinely leave a feeling behind.  Windows must lie
  # inside the NPC's reviewed weekly presence (validated at load).
  npc_initiated_events:
    - id: npc-fan-yuan-borrow-book
      initiative_kind: small_favor
      npc_id: fan-yuan
      location_id: campus-library
      summary: 范予安忽然来找她借一本读书会提到的书，几分钟的小事。
      privacy: personal
      local_windows: ["09:30-18:00"]
      weekdays: [0, 1, 2, 3, 4, 5, 6]
      duration_minutes: 10
      base_chance_bp: 1200
      outcomes:
        - id: borrow-book-easy
          text: 范予安忽然来找她借书，顺带聊了两句最近在读什么，气氛意外地轻松。
          privacy: personal
        - id: borrow-book-reluctant
          text: 范予安来借的那本她自己还没读完，犹豫了一下还是借了，心里有点小舍不得。
          privacy: personal
    - id: npc-fan-yuan-impromptu-reading-list
      initiative_kind: shared_time
      npc_id: fan-yuan
      location_id: campus-library
      summary: 范予安临时拉她一起过一遍读书会书单，大约半小时。
      privacy: personal
      local_windows: ["10:00-12:00", "14:00-18:00"]
      weekdays: [0, 1, 2, 3, 4, 5, 6]
      duration_minutes: 30
      base_chance_bp: 900
      outcomes:
        - id: impromptu-list-flowed
          text: 被范予安临时拉去对书单，本来有点被打断的烦，聊开之后反而顺得出乎意料。
          privacy: personal
        - id: impromptu-list-drained
          text: 临时陪范予安看书单，把自己原本的安排挤掉了，聊完人有点耗神。
          privacy: personal
    - id: npc-fan-yuan-reading-list-disagreement
      initiative_kind: friction
      npc_id: fan-yuan
      location_id: campus-library
      summary: 为一本书要不要进读书会书单，和范予安起了点小分歧。
      privacy: personal
      local_windows: ["10:00-18:00"]
      weekdays: [0, 1, 2, 3, 4, 5, 6]
      duration_minutes: 25
      base_chance_bp: 600
      outcomes:
        - id: disagreement-cleared
          text: 和范予安为书单选择争了几句，各退了一步，反而把选书的标准聊清楚了。
          privacy: personal
        - id: disagreement-shelved
          text: 为一本要不要进书单的书和范予安意见相左，谁都没说服谁，先搁下了。
          privacy: personal
