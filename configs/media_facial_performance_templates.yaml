# A beat is a visible, single-frame performance assembled from compatible face
# actions below. It is not an emotion diagnosis or an event-to-expression rule.
# The planner sees only the fully frozen candidate; the renderer receives the
# evidence phrasing so it does not collapse every choice into a polite smile.
expression_beats:
  present_and_available:
    - id: screen_check_return
      requires: {gaze_sequence: screen_then_lens}
      visible_evidence: ["eyes have just lifted from the phone screen", "mouth is relaxed as if a reply is about to begin"]
    - id: mid_reply_soften
      requires: {mouth_action: mid_speech}
      visible_evidence: ["lips are caught at the start of a quiet reply", "attention is returning naturally to the recipient"]
  warm_connection:
    - id: smile_arrives_in_eyes
      requires: {nose_cheek_action: cheek_lift}
      visible_evidence: ["upper cheeks have lifted before the smile fully settles", "the expression is warm rather than arranged"]
    - id: companion_reaction_return
      requires: {gaze_sequence: companion_then_camera}
      visible_evidence: ["she has just turned back from someone beside the camera", "the small smile is a reaction, not a posed default"]
  amusement_leaking:
    - id: nose_scrunch_laugh
      requires: {nose_cheek_action: small_nose_scrunch}
      visible_evidence: ["the bridge of the nose is gently scrunched", "the mouth is trying and failing to hold back a laugh"]
    - id: laugh_recovery
      requires: {temporal_phase: after_reaction}
      visible_evidence: ["the laugh has just passed", "eyes and mouth remain a little uneven while composure returns"]
  deliberate_cuteness:
    - id: tiny_pout_hold
      requires: {mouth_action: subtle_pout}
      visible_evidence: ["a tiny deliberate pout is held for a beat", "the gaze waits for the recipient's reaction without becoming doll-like"]
    - id: puffed_cheek_wait
      requires: {nose_cheek_action: cheek_puff}
      visible_evidence: ["one small cheek puff is visible", "the face looks playfully self-aware rather than like a beauty pose"]
    - id: nose_scrunch_after_head_shake
      requires: {nose_cheek_action: small_nose_scrunch, mouth_action: subtle_pout}
      visible_evidence: ["the nose is lightly scrunched above a mock-serious pout", "a few loose hairs are not fully settled from a just-finished small head shake"]
  mock_defiance:
    - id: side_eye_nope
      requires: {brow_action: one_brow_lift}
      visible_evidence: ["one brow carries a small 'really?' challenge", "the look has just come back from the side instead of fixing on the lens"]
    - id: almost_smile_refusal
      requires: {mouth_action: asymmetric_half_smile}
      visible_evidence: ["one corner of the mouth nearly gives away a smile", "the expression plays at refusing to be impressed"]
  comic_self_exposure:
    - id: deadpan_after_mess
      requires: {eye_aperture: relaxed_heavy}
      visible_evidence: ["the eyes go deliberately flat for a comic beat", "the mouth stays pressed as if silently admitting the mess"]
    - id: caught_laughing_at_it
      requires: {mouth_action: mid_speech}
      visible_evidence: ["she is caught halfway through explaining what went wrong", "the reaction is visibly less controlled than a normal selfie"]
  proud_display:
    - id: look_then_own_it
      requires: {gaze_sequence: evidence_then_recipient}
      visible_evidence: ["the eyes have checked the thing being shown before meeting the recipient", "the expression owns the result without a showroom grin"]
    - id: quietly_pleased
      requires: {mouth_action: relaxed_closed}
      visible_evidence: ["the satisfaction sits in a slight unevenness rather than a broad smile", "she looks aware that the recipient will notice"]
  consultative_check:
    - id: ask_with_eyes
      requires: {brow_action: brief_question}
      visible_evidence: ["brows lift only enough to make the question readable", "the face waits for an actual opinion rather than praise"]
    - id: mid_question
      requires: {mouth_action: mid_speech}
      visible_evidence: ["the mouth is caught at the beginning of a question", "attention moves from the item or screen back to the recipient"]
  frustrated_complaint:
    - id: try_not_to_complain
      requires: {brow_action: slight_knit}
      visible_evidence: ["a small brow knit shows irritation without melodrama", "the mouth is caught before the complaint becomes a smile"]
    - id: tiny_nope_scrunch
      requires: {nose_cheek_action: small_nose_scrunch}
      visible_evidence: ["a quick nose scrunch makes the refusal comic", "the face reads like a live reaction rather than a fixed pout"]
  embarrassed_repair:
    - id: pout_after_mistake
      requires: {mouth_action: subtle_pout}
      visible_evidence: ["a small embarrassed pout appears before she can hide it", "the eyes have just started to return after looking away"]
    - id: laugh_it_off
      requires: {mouth_action: asymmetric_half_smile}
      visible_evidence: ["the mouth is crooked from laughing at herself", "the expression is in the release after an awkward moment"]
  tired_access:
    - id: screen_low_energy
      requires: {gaze_sequence: screen_then_lens}
      visible_evidence: ["eyes lift slowly from the screen", "the face remains unperformed and low-energy"]
    - id: breath_out
      requires: {mouth_action: breath_recovery}
      visible_evidence: ["the lips show the end of an ordinary exhale", "the expression keeps the tiredness private and believable"]
  vulnerable_disclosure:
    - id: look_away_then_share
      requires: {gaze_sequence: just_returned_to_lens}
      visible_evidence: ["the gaze has only just come back from looking away", "the mouth stays quiet rather than performing distress"]
    - id: quiet_check_in
      requires: {eye_aperture: relaxed_heavy}
      visible_evidence: ["the low-energy eyes stay soft and present", "the face offers access without asking the camera to dramatize it"]
  tender_private:
    - id: soft_held_attention
      requires: {gaze_sequence: held_lens}
      visible_evidence: ["attention rests with the recipient for an unhurried beat", "a small cheek lift keeps the closeness warm, not vacant"]
    - id: just_looked_up
      requires: {gaze_sequence: screen_then_lens}
      visible_evidence: ["she has just looked up from what she was doing", "the slight pause feels chosen for one recipient"]
  desire_direct:
    - id: knowing_stillness
      requires: {gaze_sequence: held_lens}
      visible_evidence: ["the gaze is held with clear awareness of the recipient", "the expression stays deliberately restrained rather than becoming a stock glamour smile"]
    - id: not_quite_smile
      requires: {mouth_action: asymmetric_half_smile}
      visible_evidence: ["one corner of the mouth suggests a smile without completing it", "the invitation comes from attention and timing, not exaggerated facial acting"]
  desire_withheld:
    - id: almost_look_back
      requires: {gaze_sequence: just_returned_to_lens}
      visible_evidence: ["the eyes have just returned after withholding attention for a moment", "the mouth keeps a small reaction to itself"]
    - id: held_back_smile
      requires: {mouth_action: suppressed_smile}
      visible_evidence: ["a smile is visibly being held back", "the attention remains directed toward the recipient without a direct glamour stare"]
  neutral_evidence:
    - id: evidence_then_face
      requires: {gaze_sequence: evidence_then_recipient}
      visible_evidence: ["eyes move from the evidence back to the camera", "the face stays secondary to what is being shown"]
    - id: mid_explanation
      requires: {mouth_action: mid_speech}
      visible_evidence: ["the image catches a natural explanatory beat", "the expression does not turn an evidence photo into a portrait pose"]

# All axes are visible still-frame observations. They must never be interpreted as
# diagnoses, hidden emotions, personality traits, or a time series proven by one image.
visible_action_axes:
  brow_action: [neutral, settled, soft_lift, bilateral_lift, one_brow_lift, brief_question, slight_inward_draw, slight_knit, relaxed_lowered, not_visible]
