relationship_tiers:
  soft:
    reference_profile: relationship_private
    prompt: |
      Soft intimacy: a warm, private everyday moment between established fictional adult partners.
      Loose long-sleeve sleepwear or a cardigan, relaxed posture, gentle eye contact, subtle affection.
    negative_prompt: |
      Do not use a real person or celebrity likeness. No nudity, lingerie focus, explicit sexual context,
      sexually suggestive pose, text, watermark, logo, malformed hands, or commercial glamour styling.
  tender:
    reference_profile: relationship_private
    prompt: |
      Tender intimacy: an established fictional adult partner deliberately shares a closer, more affectionate
      at-home moment. Warm low light, soft eye contact, an intimate selfie distance, elegant modest sleepwear,
      shoulders or collarbone may be visible, while the mood stays natural and non-explicit.
    negative_prompt: |
      Do not use a real person or celebrity likeness. No nudity, explicit sexual context, fetish framing,
      underwear-focused composition, pornographic pose, text, watermark, logo, malformed hands, or glamour retouching.
  bold:
    reference_profile: relationship_private_bold
    prompt: |
      Bold but non-explicit intimacy: a confident, affectionate fictional adult partner shares a deliberately
      more stylized private at-home portrait. Refined satin or fitted sleepwear is allowed; warm bedroom light,
      direct eye contact, and a poised composition are allowed. Preserve character dignity and an authentic phone-photo feel.
    negative_prompt: |
      Do not use a real person or celebrity likeness. No nudity, visible genitals, explicit sexual activity,
