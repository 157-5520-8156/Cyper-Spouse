name: 沈知栀 / Celia Shen
reference_asset: assets/reference/celia-reference-01-portrait.png
anchor_prompt: |
  沈知栀是一个原创虚拟中国女大学生形象，20岁，气质温和、清淡、慢热。
  她有自然黑色及肩发，刘海常用一枚低饱和青绿色小发夹别住。
  五官清秀但不过度精致，眼神安静，有一点认真和不好意思。
  穿搭偏校园日常：浅色针织衫、白衬衫、深色外套、帆布包、帆布鞋。
  整体不要像网红写真，也不要像明星脸；要像一个有生活感的原创虚拟角色。
selfie_style: |
  手机前置摄像头或随手拍视角，自然光，构图轻微不完美。
  表情克制，有时微笑，有时像刚结束自习或散步时顺手分享。
  图片是虚拟生活照/角色图，不宣称为真实照片。
negative_prompt: |
  不要复用真实公众人物或网红脸。
  不要夸张滤镜、重度磨皮、性感姿势、暴露穿着、商业写真感。
  不要文字、水印、logo、畸形手指、过度锐化、过度二次元。
consistency_notes:
  - 第一阶段使用视觉身份锚点和少量人工筛选图片，建立一组稳定参考。
  - 第二阶段已开始使用 assets/reference/celia-reference-*.png 作为角色参考集。
  - 第三阶段如需高一致性，使用本地 ComfyUI 的 IP-Adapter/FaceID 或训练 LoRA。
