version: 1

# These are coherent photographic performances. MediaPlanner chooses one ID;
# it does not independently compose pose axes and accidentally create a puppet.
variants:
  - id: aware_three_quarter
    capture_modes: [character_front_camera, character_rear_camera]
    character_visibilities: [identifiable]
    appearance: &everyday_appearance
      hair_arrangements: [hair_down_tucked, half_up, low_ponytail, loose_small_bun, clipped_back, natural_down]
      grooming: [natural, lightly_put_together]
      accessory_options: [[], [teal_hair_clip]]
    performance:
      head_yaw: toward_frame_right
      head_pitch: level
      head_roll: none
      gaze_target: lens
      expression: trying_not_to_laugh
      shoulder_orientation: three_quarter_opposite_head
      posture: relaxed_engaged
      gesture: show_primary_evidence
      photo_awareness: aware_light_pose

  - id: look_at_primary
    capture_modes: [character_front_camera, character_rear_camera, known_companion]
    character_visibilities: [identifiable]
    appearance: *everyday_appearance
    performance:
      head_yaw: toward_frame_left
      head_pitch: slightly_down
      head_roll: none
      gaze_target: primary_evidence
      expression: focused_amused
      shoulder_orientation: open_three_quarter
      posture: leaning_slightly_into_activity
      gesture: interact_with_primary_evidence
      photo_awareness: aware_of_photo_not_staring

  - id: screen_check_reaction
    capture_modes: [character_front_camera]
    character_visibilities: [identifiable]
    appearance: *everyday_appearance
    performance:
      head_yaw: near_front
      head_pitch: slightly_down
      head_roll: none
      gaze_target: phone_screen
      expression: embarrassed_half_smile
      shoulder_orientation: slightly_turned
      posture: compact_casual
      gesture: hold_or_point_at_primary_evidence
      photo_awareness: checking_own_frame

  - id: playful_level_pose
    capture_modes: [character_front_camera, mirror, timer_fixed]
    character_visibilities: [identifiable]
    appearance: *everyday_appearance
    performance:
      head_yaw: toward_frame_left
      head_pitch: level
      head_roll: slight_opposite
      gaze_target: lens
      expression: playful_asymmetric_smile
      shoulder_orientation: dynamic_three_quarter
      posture: weight_shifted
      gesture: small_contextual_pose
      photo_awareness: deliberately_playful

  - id: mirror_composed
    capture_modes: [mirror]
    character_visibilities: [identifiable]
    appearance: *everyday_appearance
    performance:
      head_yaw: near_front
      head_pitch: level
      head_roll: none
      gaze_target: mirror_phone_screen
      expression: calm_self_check
      shoulder_orientation: three_quarter
      posture: balanced_weight_shift
      gesture: adjust_clothing_or_accessory
      photo_awareness: composed_mirror_pose

  - id: timer_environment_pose
    capture_modes: [timer_fixed, requested_helper]
    character_visibilities: [identifiable]
    appearance: *everyday_appearance
    performance:
      head_yaw: toward_frame_right
      head_pitch: level
      head_roll: none
      gaze_target: lens
      expression: open_warm_smile
      shoulder_orientation: open_to_environment
      posture: mid_step_or_weight_shift
      gesture: contextual_hand_pose
      photo_awareness: friendly_requested_photo

  - id: helper_checkin_pose
    capture_modes: [requested_helper, known_companion]
    character_visibilities: [identifiable]
    appearance: *everyday_appearance
    performance:
      head_yaw: toward_frame_left
      head_pitch: slightly_up
      head_roll: none
      gaze_target: photographer
      expression: bright_photo_smile
      shoulder_orientation: three_quarter_to_environment
      posture: settled_pose_with_energy
      gesture: acknowledge_place_or_object
      photo_awareness: clearly_posing_for_friend

  - id: companion_reaction
    capture_modes: [known_companion, external_sender]
    character_visibilities: [identifiable]
    appearance: *everyday_appearance
    performance:
      head_yaw: toward_frame_right
      head_pitch: level
      head_roll: slight
      gaze_target: known_companion
      expression: caught_in_real_laugh
      shoulder_orientation: turned_toward_companion
      posture: relaxed_in_interaction
      gesture: conversational_hand_gesture
      photo_awareness: noticed_camera_mid_moment

  - id: external_candid_glance
    capture_modes: [external_sender]
    character_visibilities: [identifiable]
    appearance: *everyday_appearance
    performance:
      head_yaw: away_then_back
      head_pitch: level
      head_roll: none
      gaze_target: nearby_activity
      expression: neutral_attentive
      shoulder_orientation: in_motion_three_quarter
      posture: active_not_surveillance
      gesture: continue_event_action
      photo_awareness: lightly_aware

  - id: body_detail_showcase
    capture_modes: [character_front_camera, character_rear_camera, mirror, existing_artifact]
    character_visibilities: [body_detail]
    appearance: *everyday_appearance
    performance:
      head_yaw: not_applicable
      head_pitch: not_applicable
      head_roll: not_applicable
      gaze_target: not_applicable
      expression: not_applicable
      shoulder_orientation: not_applicable
      posture: stable_detail_presentation
      gesture: present_specific_body_detail
      photo_awareness: deliberate_detail_showing

render_lexicon:
  hair_arrangement:
    hair_down_tucked: hair worn down, with the front strands visibly tucked behind one ear
    half_up: upper hair visibly gathered into a relaxed half-up arrangement
    low_ponytail: hair visibly gathered into a low ponytail at the nape
    loose_small_bun: hair visibly gathered into a loose small bun, with a few natural strands free
    clipped_back: front and side strands visibly secured away from the face by the selected clip; the clip must functionally hold the hair rather than merely decorate loose hair
    natural_down: naturally loose shoulder-length hair with no forced symmetry
  outfit_role:
    home_cooking: ordinary comfortable home clothes suitable for cooking, with practical sleeves
    event_appropriate_casual: ordinary casual clothes visibly appropriate to the current activity and location
    campus_casual: understated campus clothes suitable for studying or class
    athletic: practical exercise clothing supported by the current activity
    home_rest: relaxed modest clothing suitable for resting at home
    travel_casual: comfortable layered clothing suitable for travel
    outdoor_casual: comfortable everyday clothing suitable for walking outdoors
    event_appropriate: clothing visibly appropriate to the frozen event
    navy_cardigan_and_cream_top: a navy cardigan over a cream top
  grooming:
    natural: natural grooming with real skin texture and no editorial polish
    lightly_put_together: lightly put together while retaining an everyday appearance
  accessories:
    teal_hair_clip: one muted teal hair clip, visibly performing the planned hair arrangement
  head_yaw:
    near_front: face almost forward, without a habitual cute head tilt
    toward_frame_left: head turned toward the left side of the image frame
    toward_frame_right: head turned toward the right side of the image frame
    away_then_back: head caught during a natural look away and partial glance back
    not_applicable: head is outside this body-detail composition
  head_pitch:
    level: chin and eye line remain level, neither noticeably raised nor lowered
    slightly_down: chin lowered slightly while the neck remains natural
    slightly_up: chin raised slightly without an exaggerated angle
    not_applicable: head pitch is outside this body-detail composition
  head_roll:
    none: keep both eyes approximately level; do not tilt the head toward either shoulder
    slight: use only a subtle natural roll, not the identity reference's habitual tilt
    slight_opposite: use a subtle roll opposite to the shoulder turn
    not_applicable: head roll is outside this body-detail composition
  gaze_target:
    lens: eyes look into the camera lens
    primary_evidence: eyes visibly attend to the selected event evidence
    phone_screen: eyes check the phone screen rather than staring into the lens
    mirror_phone_screen: eyes plausibly look at the reflected phone screen
    photographer: eyes acknowledge the person taking the photo
    known_companion: eyes attend to the known companion
    nearby_activity: eyes attend to the nearby activity
    not_applicable: gaze is outside this body-detail composition
  expression:
    trying_not_to_laugh: a restrained trying-not-to-laugh expression, not the reference's closed-mouth smile
    focused_amused: attention stays on the activity with a small trace of amusement
    embarrassed_half_smile: a mildly embarrassed asymmetric half-smile
    playful_asymmetric_smile: a playful but believable asymmetric smile
    calm_self_check: a calm expression while checking her appearance
    open_warm_smile: an open warm smile appropriate to a deliberately taken photo
    bright_photo_smile: a bright but non-commercial smile for a friendly requested photo
    caught_in_real_laugh: a natural laugh caught during interaction rather than performed for an advertisement
    neutral_attentive: a neutral attentive expression grounded in the activity
    not_applicable: facial expression is outside this body-detail composition
  shoulder_orientation:
    three_quarter_opposite_head: shoulders turn in a gentle three-quarter direction opposite the head turn
    open_three_quarter: shoulders remain open in a relaxed three-quarter angle
    slightly_turned: shoulders turn slightly rather than facing the camera squarely
    dynamic_three_quarter: shoulders use an energetic but believable three-quarter angle
    three_quarter: shoulders form a clear natural three-quarter line
    open_to_environment: torso and shoulders stay visually connected to the surrounding place
    three_quarter_to_environment: shoulders angle toward the environment while the face acknowledges the camera
    turned_toward_companion: shoulders turn toward the known companion
    in_motion_three_quarter: shoulders show a natural transitional three-quarter orientation
    not_applicable: shoulders are outside this body-detail composition
  posture:
    relaxed_engaged: relaxed posture with visible engagement in the sharing action
    leaning_slightly_into_activity: body leans slightly toward the current activity
    compact_casual: compact casual posture suited to a close front-camera frame
    weight_shifted: weight shifts naturally rather than forming a centered static pose
    balanced_weight_shift: balanced mirror pose with a subtle natural weight shift
    mid_step_or_weight_shift: either a small mid-step or a clear natural weight shift
    settled_pose_with_energy: a settled friendly pose that still carries some energy
    relaxed_in_interaction: relaxed posture visibly connected to the social interaction
    active_not_surveillance: active everyday posture, never surveillance-like
    stable_detail_presentation: stable positioning that makes the intended detail easy to inspect
  gesture:
    show_primary_evidence: use the free hand or free forearm to present the selected event evidence clearly
    interact_with_primary_evidence: visibly interact with the selected evidence instead of merely standing beside it
    hold_or_point_at_primary_evidence: naturally hold or point toward the selected evidence with an anatomically clear hand
    small_contextual_pose: make a small deliberate pose that is meaningful in the current context
    adjust_clothing_or_accessory: naturally adjust the selected clothing or accessory without tangling fingers or fabric
    contextual_hand_pose: use a small hand pose that fits the place and activity
    acknowledge_place_or_object: use a restrained gesture acknowledging the selected place or object
    conversational_hand_gesture: use a natural hand gesture from an ongoing conversation
    continue_event_action: continue the event action rather than freezing for the camera
    present_specific_body_detail: position the relevant body detail clearly without inventing another condition
  photo_awareness:
    aware_light_pose: clearly aware of the camera and making a light friend-facing pose
    aware_of_photo_not_staring: aware of being photographed without forcing direct eye contact
    checking_own_frame: visibly checking her own phone framing
    deliberately_playful: knowingly playful for the photo without exaggerated performance
    composed_mirror_pose: deliberately composed for a mirror photo
    friendly_requested_photo: posing naturally for a friendly requested photo
    clearly_posing_for_friend: clearly but casually posing for a friend
    noticed_camera_mid_moment: has just noticed the camera during a real interaction
    lightly_aware: lightly aware of the camera while staying in the activity
    deliberate_detail_showing: deliberately making the requested detail visible
  hand_occupancy:
    one_hand_operates_phone_other_presents_evidence: one hand operates the phone while the other free hand or forearm presents the evidence; never merge the two arms
    one_hand_operates_phone_other_remains_natural: one hand operates the phone while the other remains anatomically natural
    one_hand_holds_phone_other_performs_gesture: one hand visibly holds the phone in the mirror while the other performs the planned gesture
    both_hands_available: the camera is externally supported, so both hands are available for the planned gesture
    unspecified: preserve physically plausible hand responsibilities for the stated capture mode

