      - tests/world_v2/test_http_v2_host_migration.py::test_http_default_composition_retains_a_fact_and_retrieval_memory_off_reply_path

  # Producer inventory verdict (2026-07-20): all four `.16` situation
  # authorities are mechanically complete, but no production ledger has ever
  # committed one of their events and no runtime constructs their payloads.
  # They stay dormant rather than removed because reducers, typed proposal
  # families, event catalog, situation compiler and 8k+ test lines form one
  # shared replay surface (goal_situation_schemas is the cause-authority base
  # for every v16 domain), so the removal blast radius outweighs the carrying
  # cost.  Per-domain disposition:
  # - goal: the honest producer is her own deliberative goal vertical, a full
  #   delivery.  Seeding world_seed.long_term_goals was rejected: those are
  #   v1 scheduler inputs whose deadlines have already passed, so
  #   provisioning them would only manufacture immediate mechanical expiries.
  #   goal_expiry_runtime stays wired but fires only on existing heads.
  # - location: current location reaches deliberation through active Plan
  #   heads; a plan-derived location producer would install a second voice
  #   for the same truth and needs a real settlement-lane design first.
  # - resource: one-shot seeding of world_seed energy/attention would freeze
  #   a never-adjusted number into the capsule; the honest producer is
  #   activity-settlement resource pressure, again a full delivery.
  # - attention: the live phone-presence need is served by the attention_view
  #   advisory (pure projection, landed 2026-07-19); the authority head stays
  #   dormant until an event-sourced producer is actually required.
  # Activating any of these requires a new producer verdict recorded here
  # first; see Producer-First Authority in CONTEXT.md.
  - id: v16-situation-constituents
    phase: 2
    status: closed
    runtime_activation: harness
    limitations: [dormant-no-production-producer-for-any-v16-authority-event, harness-and-tests-are-the-only-writers, situation-compiler-reports-these-domains-as-authoritative-empty]
    sources: [operator-authority, accepted-proposal, logical-clock]
    events: [V2GoalOpened, V2LocationChanged, V2ResourceStateAdjusted, V2AttentionChanged]
    reducers: [src/companion_daemon/world_v2/reducers.py]
    projections: [goals, location, resources, attention]
    decision_consumers: [SituationCompiler, Deliberation]
    actions: []
    terminal_states: []
    adapters: []
    tests:
      - tests/world_v2/test_goal_authority_v16.py::test_goal_hashes_normalize_equivalent_datetime_offsets
      - tests/world_v2/test_location_integration_v16.py::test_location_typed_roundtrip_reopen_rebuild_and_project_at
      - tests/world_v2/test_resource_authority_v16.py::test_reducer_is_zero_cascade_and_rejects_duplicate_transition_identity
      - tests/world_v2/test_attention_authority_v16.py::test_replay_state_validator_requires_exact_committed_event_and_head

  - id: situation-context-and-advisory
    phase: 3
    status: closed
    runtime_activation: default
    limitations: [advisory-is-rejectable-by-design, unavailable-authority-remains-explicit]
    sources: [LedgerProjectionContextResolver, source-bound-authority-heads, advisory-adapters]
    events: [ObservationRecorded, ClockAdvanced]
    reducers: [src/companion_daemon/world_v2/reducers.py]
