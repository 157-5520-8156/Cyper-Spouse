# Machine-readable evidence index for World v2.
#
# `closed` means the named *narrow v2 mechanism* has code-level/replay evidence.
# It never means every product adapter is default-enabled or that external human
# evaluation has been completed.  See docs/world-runtime-status.md for the
# corresponding deployment and evaluation limits.
schema_version: 2
terminal_state_vocabulary: [delivered, failed, cancelled, expired, unknown]
runtime_authority:
  canonical_v2_write_model: companion_daemon.world_v2.runtime::WorldRuntime
  v2_ingress_hosts:
    - companion_daemon.world_v2.http_capture_host::HttpV2CaptureHost
    - companion_daemon.world_v2.qq_c2c_host::QQC2CHost
  deployment_activation: default
  legacy_status: explicit-archive-only-for-default-route-graph
  external_evidence: pending

# These are paths that must not reach a legacy behavior writer.  They are v2
# application seams, not a claim that the old Engine has disappeared.
world_only_scopes:
  - src/companion_daemon/world_v2/runtime.py
  - src/companion_daemon/world_v2/world_turn_runtime.py
  - src/companion_daemon/world_v2/platform_host.py
  - src/companion_daemon/world_v2/http_capture_host.py
  - src/companion_daemon/world_v2/qq_c2c_host.py
  - src/companion_daemon/world_v2/qq_c2c_onebot_app.py
  - src/companion_daemon/world_v2/platform_action_executor.py
  - src/companion_daemon/world_v2/media_execution_runtime.py
  - src/companion_daemon/world_v2/room_projection.py
  - src/companion_daemon/world_v2/dashboard_projection_adapter.py
legacy_behavior_writers:
  - CompanionStore.save_incoming
  - CompanionStore.queue_outgoing
  - CompanionStore.queue_outgoing_with_turn_trace
  - CompanionStore.mark_outgoing_delivered
  - CompanionStore.mark_outgoing_failed
  - CompanionStore.resolve_outgoing_and_turn_trace
  - CompanionStore.create_turn_trace
  - CompanionStore.complete_turn_trace
  - CompanionStore.resolve_turn_trace
  - CompanionStore.save_outgoing
  - CompanionStore.save_mood_state
  - CompanionStore.save_life_runtime
  - CompanionStore.record_life_event
  - CompanionStore.complete_active_life_events
  - CompanionStore.correct_active_life_event
  - CompanionStore.create_calendar_event
  - CompanionStore.save_calendar_week
  - CompanionStore.update_calendar_event_status
  - CompanionStore.postpone_next_calendar_event
  - CompanionStore.cancel_next_calendar_event
  - CompanionStore.sync_calendar_event_memory
  - CompanionStore.delete_calendar_events_by_source_prefix
  - CompanionStore.cancel_elapsed_calendar_plans
  - CompanionStore.normalize_single_day_weekly_plans
  - CompanionStore.mark_life_event_shared
  - CompanionStore.save_life_day_plan
  - CompanionStore.update_life_day_plan_status
  - CompanionStore.activate_life_day_plan_item
  - CompanionStore.adjust_next_life_day_plan_item
  - CompanionStore.create_social_task
  - CompanionStore.cancel_social_task
  - CompanionStore.resolve_social_task
  - CompanionStore.cancel_active_social_tasks
  - CompanionStore.claim_due_social_tasks
  - CompanionStore.defer_social_task
  - CompanionStore.upsert_memory
  - CompanionStore.delete_memory
  - CompanionStore.record_fact_observation
  - CompanionStore.record_interaction_event
  - CompanionStore.save_proactive_event
  - advance_life_runtime
  - maybe_apply_planned_life_result
  - synchronize_life_runtime

mechanisms:
  - id: v2-ledger-projection-replay
    phase: 2
    status: closed
    runtime_activation: limited-production
    limitations: [only-routed-v2-ingress-is-covered]
    sources: [Observation, ClockObservation, ExternalObservation]
    events: [ObservationRecorded, ClockAdvanced, ExternalObservationRecorded]
    reducers: [src/companion_daemon/world_v2/reducers.py]
