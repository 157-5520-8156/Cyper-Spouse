      - tests/world_v2/test_situation_compiler_v16.py::test_viewer_budget_truncates_stable_prefix_without_changing_internal_hash
      - tests/world_v2/test_advisory_compiler.py::test_compiles_source_bound_rejectable_advisory_without_mutation_ports
