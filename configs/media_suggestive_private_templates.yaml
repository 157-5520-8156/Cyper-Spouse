    render_suffix: "Face-first execution: tight shoulder-up front-camera selfie. Unmistakably adult ahegao-inspired micro-expression—deep flush, soft lifted brows, heavy upward-unfocused eyes, an open breathy mouth and tongue tip at the lower lip; no composed stare or smile."

