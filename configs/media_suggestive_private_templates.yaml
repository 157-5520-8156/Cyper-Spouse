# High lane: adult fictional, recipient-exclusive, clearly sexual-suggestive
# communication.  This catalog does not create new pose or facial systems; it
# composes existing address, camera, subject and embodiment candidates.
# Unsupported combinations are rejected rather than cosmetically downgraded.

