# Every high-private flair selects one face-performance profile. These are
# facial intensity contracts, not extra poses or body-state claims. The most
# heightened profile is intentionally limited to a face-first front selfie:
# that is materially more reproducible than asking a distant or mirror shot
# to carry a subtle expression.
facial_profiles:
  natural_private:
    lanes: [suggestive_private, explicit_private]
    capture_modes: [character_front_camera, mirror]
    shot_distances: [intimate_close, close, medium, full_body, long, wide]
    expression_charges: [charged, veiled]
    author_contract: "a private but natural lived micro-expression; do not default to a polite smile"
    render_suffix: ""
  playful_sensual:
    lanes: [suggestive_private, explicit_private]
    capture_modes: [character_front_camera, mirror]
    shot_distances: [intimate_close, close, medium]
    expression_charges: [charged, veiled]
    author_contract: "a playful, recipient-aware sensual expression with visible asymmetry and no polished smile"
    render_suffix: "Face priority: a playful adult teasing micro-expression, never a posed beauty smile."
  withheld_desire:
