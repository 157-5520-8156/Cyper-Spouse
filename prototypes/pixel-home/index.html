<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>像素小屋 · Pixel Home</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>像素小屋</h1>
    <span id="clock">08:00</span>
    <span id="status">发呆</span>
    <span class="meta">点地板走过去 · 点家具互动</span>
  </header>

  <div class="stage-wrap">
    <canvas id="stage" width="1120" height="640"></canvas>
  </div>

  <div class="toolbar">
    <button id="mode">✎ 布置房间</button>
    <button id="speed">时间 ×1</button>
    <span class="group-label" id="actions-label">让她去：</span>
    <div id="actions"></div>
    <div id="palette"></div>
    <span style="flex:1"></span>
    <button id="export">导出布局</button>
    <button id="import">导入布局</button>
    <button id="reset">重置</button>
    <p id="edit-hint">编辑模式：左键选中/放下家具，从下面的清单添加新家具，右键删除或取消。布局自动保存到浏览器。</p>
  </div>

  <div id="iobox">
    <div class="box">
      <strong style="font-size:13px">房间布局 JSON</strong>
      <textarea id="iotext" spellcheck="false"></textarea>
      <div class="row">
        <button id="ioapply">应用</button>
        <button id="ioclose">关闭</button>
      </div>
    </div>
  </div>

  <script src="js/pixel.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/actor.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
